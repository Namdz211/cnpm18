<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - VéXeAZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><i class="fa-solid fa-bus"></i> VéXeAZ</a>
        </div>
    </nav>

    <div class="container" style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
        <div style="background:var(--white); padding:40px; border-radius:16px; box-shadow:var(--shadow-lg); width:100%; max-width:400px; border: 1px solid var(--border-color);">
            <div style="text-align:center; margin-bottom:30px;">
                <h2 style="color:var(--primary-color)"><i class="fa-solid fa-bus"></i> VéXeAZ</h2>
                <p style="color:var(--text-light); margin-top:10px;">Đăng nhập để tiếp tục</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">Email hoặc Số điện thoại</label>
                    <input type="text" id="username" placeholder="Nhập email hoăc SĐT" required style="width:100%; padding:14px; border:1px solid var(--border-color); border-radius:8px; font-family:inherit;">
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required style="width:100%; padding:14px; border:1px solid var(--border-color); border-radius:8px; font-family:inherit;">
                </div>
                
                <div style="display:flex; justify-content:space-between; margin-bottom: 25px; font-size: 0.95rem;">
                    <label style="color:var(--text-dark); cursor:pointer;"><input type="checkbox"> Nhớ mật khẩu</label>
                    <a href="#" style="color:var(--primary-color); font-weight:500;">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; font-size:1.1rem; justify-content:center;">Đăng Nhập</button>
            </form>
            
            <div style="margin-top: 30px; text-align:center;">
                <p style="color:var(--text-light); font-size:0.9rem; margin-bottom:15px;">Hoặc đăng nhập bằng</p>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button class="btn btn-outline" style="flex:1; padding:10px;"><i class="fa-brands fa-google text-danger"></i> Google</button>
                    <button class="btn btn-outline" style="flex:1; padding:10px;"><i class="fa-brands fa-facebook" style="color:#1877F2"></i> Facebook</button>
                </div>
            </div>
            
            <p style="text-align:center; margin-top:30px; font-size: 0.95rem; color:var(--text-dark);">
                Chưa có tài khoản? <a href="register.html" style="color:var(--primary-color); font-weight:700;">Đăng ký ngay</a>
            </p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) return;

            try {
                const res = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Save token and user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    Swal.fire({
                        icon: 'success',
                        title: 'Thành công',
                        text: 'Đăng nhập thành công!',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        if (data.user.role === 'Admin') {
                            window.location.href = "admin/index.html";
                        } else {
                            window.location.href = "index.html";
                        }
                    });
                } else {
                    Swal.fire('Lỗi', data.message || 'Đăng nhập thất bại', 'error');
                }
            } catch (err) {
                console.error(err);
                Swal.fire('Lỗi', 'Không thể kết nối đến máy chủ.', 'error');
            }
        });
    </script>
</body>
</html>
